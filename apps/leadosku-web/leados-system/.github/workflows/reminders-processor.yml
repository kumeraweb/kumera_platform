name: Reminders Processor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-reminders-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminders processor
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.LEADOS_REMINDERS_ENDPOINT }}" \
            -H "Authorization: Bearer ${{ secrets.LEADOS_CRON_SECRET }}"
