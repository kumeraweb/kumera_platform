name: Billing Crons

on:
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"

jobs:
  billing-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger generate-next-payments
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.BILLING_BASE_URL }}/api/jobs/generate-next-payments" \
            -H "Authorization: Bearer ${{ secrets.BILLING_CRON_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Trigger overdue-marking
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.BILLING_BASE_URL }}/api/jobs/overdue-marking" \
            -H "Authorization: Bearer ${{ secrets.BILLING_CRON_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Trigger reminders
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.BILLING_BASE_URL }}/api/jobs/reminders" \
            -H "Authorization: Bearer ${{ secrets.BILLING_CRON_SECRET }}" \
            -H "Content-Type: application/json"
