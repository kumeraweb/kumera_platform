name: Billing Crons

on:
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"

jobs:
  billing-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run billing cron jobs script
        env:
          BILLING_BASE_URL: ${{ secrets.BILLING_BASE_URL }}
          BILLING_CRON_SECRET: ${{ secrets.BILLING_CRON_SECRET }}
        run: bash apps/kumerabilling-web/scripts/cron/run-billing-crons.sh
