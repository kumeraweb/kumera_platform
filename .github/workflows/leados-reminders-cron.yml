name: LeadOS Reminders Cron

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  leados-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger LeadOS reminders processor
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.LEADOS_BASE_URL }}/api/reminders/process" \
            -H "Authorization: Bearer ${{ secrets.LEADOS_CRON_SECRET }}" \
            -H "x-internal-cron-secret: ${{ secrets.LEADOS_CRON_SECRET }}" \
            -H "Content-Type: application/json"
