name: LeadOS Reminders Cron

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  leados-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run LeadOS reminders cron script
        env:
          LEADOS_BASE_URL: ${{ secrets.LEADOS_BASE_URL }}
          LEADOS_CRON_SECRET: ${{ secrets.LEADOS_CRON_SECRET }}
        run: bash apps/leadosku-web/leados-system/scripts/cron/run-reminders-cron.sh
